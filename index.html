<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery | HorizonTechX</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🖼️ HorizonTechX Gallery</div>
            <ul class="nav-links">
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#filters">Filters</a></li>
            </ul>
        </div>
    </nav>

    <!-- Header Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>My Image Gallery</h1>
            <p>Explore beautiful images with interactive features</p>
        </div>
    </section>

    <!-- Filter Section -->
    <section class="filter-section" id="filters">
        <div class="container">
            <h2>Filter by Category</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="nature">Nature</button>
                <button class="filter-btn" data-filter="technology">Technology</button>
                <button class="filter-btn" data-filter="urban">Urban</button>
                <button class="filter-btn" data-filter="abstract">Abstract</button>
            </div>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery-section" id="gallery">
        <div class="container">
            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery items will be populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close">&times;</span>
        <button class="lightbox-btn lightbox-prev" id="lightboxPrev">&#10094;</button>
        <div class="lightbox-content">
            <img class="lightbox-image" id="lightboxImage" src="" alt="Full size image">
            <div class="lightbox-info">
                <p class="lightbox-title" id="lightboxTitle"></p>
                <p class="lightbox-category" id="lightboxCategory"></p>
            </div>
        </div>
        <button class="lightbox-btn lightbox-next" id="lightboxNext">&#10095;</button>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 HorizonTechX Gallery. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
